# First-stage MVP config. This stage uses a mock detector, not YOLO.
detector_mode: mock
camera_index: 0
max_frames: 8
frame_delay_seconds: 0.2
mediapipe_model_path: models/hand_landmarker.task
mediapipe_min_detection_confidence: 0.6
mediapipe_min_tracking_confidence: 0.5
palm_spread_threshold: 0.55
gesture_confirmation_frames: 2
gesture_missing_tolerance_frames: 1

# "none" means no usable gesture in this frame.
# "start" means start or resume following.
# "stop" means stop following. In this MVP, pause and stop share this gesture.
mock_gesture_sequence:
  - none
  - start
  - start
  - none
  - none
  - stop
  - stop
  - none
